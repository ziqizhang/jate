site_name: JATE — Just Automatic Term Extraction
site_url: https://ziqizhang.github.io/jate/
site_description: A Python library for automatic term extraction from text corpora.
repo_url: https://github.com/ziqizhang/jate
repo_name: ziqizhang/jate
edit_uri: edit/dev/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: numpy
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - User Guide:
      - Architecture: guide/architecture.md
      - Algorithms: guide/algorithms.md
      - Candidate Extractors: guide/extractors.md
      - Corpus Management: guide/corpus.md
      - Evaluation & Benchmarking: guide/evaluation.md
      - CLI Reference: guide/cli.md
      - Export Formats: guide/export.md
  - API Reference: reference/api.md
  - Contributing: contributing.md
  - Changelog: changelog.md
