name: CI

on:
  pull_request:
    branches: ["master"]

  push:
    branches: ["master"]

  workflow_dispatch:

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  docker-smoke-test-change-detection:
    name: Detect docker and server related changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      docker_smoke: ${{ steps.filter.outputs.docker_smoke }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Filter changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: dev
          filters: |
            docker_smoke:
              - "Dockerfile"
              - ".dockerignore"
              - "scripts/docker_smoke_api.sh"
              - "src/jate/server.py"
              - "src/jate/api.py"
              - "pyproject.toml"
              - "poetry.lock"
              - ".github/workflows/ci.yml"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install poetry>=2.0.0

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --with dev --extras server

      - name: Run black check
        run: poetry run black --check src/ tests/

      - name: Run isort check
        run: poetry run isort --check-only src/ tests/

      - name: Run flake8
        run: poetry run flake8 src/ tests/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Poetry
        run: pipx install poetry>=2.0.0

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: ${{ runner.os }}-poetry-py${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --with dev --extras server

      - name: Download spaCy model
        run: poetry run python -m spacy download en_core_web_sm

      - name: Run tests
        run: |
          poetry run pytest tests/ \
            -v \
            --tb=short \
            --cov=jate \
            --cov-report=xml \
            --cov-report=term-missing
        timeout-minutes: 5

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install poetry>=2.0.0

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --with dev --extras server

      - name: Run mypy
        run: poetry run mypy src/jate/

  build:
    name: Build package
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pipx install poetry>=2.0.0

      - name: Build package
        run: poetry build

      - name: Verify package contents
        run: |
          pip install dist/*.whl
          python -c "import jate; print(jate.__version__)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [docker-smoke-test-change-detection]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.docker-smoke-test-change-detection.outputs.docker_smoke == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run Docker API smoke checks
        run: bash scripts/docker_smoke_api.sh
